<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>welcom to premium learners arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-lg p-8">

        <!-- Toggle Buttons -->
        <div class="flex justify-center mb-6">
            <button onclick="showLogin()" id="loginBtn"
                class="px-4 py-2 font-semibold text-white bg-blue-600 rounded-l-lg">
                Sign In
            </button>

            <button onclick="showSignup()" id="signupBtn"
                class="px-4 py-2 font-semibold text-gray-700 bg-gray-200 rounded-r-lg">
                Sign Up
            </button>
        </div>

        <!-- ================= SIGN IN ================= -->
        <form id="loginForm" class="space-y-4">
            <h2 class="text-2xl font-bold text-center mb-4">Welcome Back</h2>

            <input type="email" placeholder="Email"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />

            <input type="password" placeholder="Password"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />

            <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                Sign In
            </button>

            <!-- Forgot Password -->
            <p class="text-sm text-center mt-2">
                <a href="#" onclick="showForgotPassword()" class="text-blue-600 hover:underline">
                    Forgot Password?
                </a>
            </p>
        </form>

        <!-- ================= SIGN UP ================= -->
        <form id="signupForm" class="space-y-4 hidden">
            <h2 class="text-2xl font-bold text-center mb-4">Create Account</h2>

            <input type="text" placeholder="Full Name"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" />

            <input type="email" placeholder="Email"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" />

            <input type="password" placeholder="Password"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" />

            <input type="password" placeholder="Confirm Password"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" />

            <button class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
                Sign Up
            </button>
        </form>

        <!-- ================= FORGOT PASSWORD ================= -->
        <form id="forgotForm" class="space-y-4 hidden">
            <h2 class="text-2xl font-bold text-center mb-2">Reset Password</h2>

            <p class="text-sm text-gray-500 text-center mb-4">
                Enter your Gmail address and we’ll send a reset link.
            </p>

            <input type="email" placeholder="Enter your Gmail"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500" />

            <button type="button" onclick="sendResetLink()"
                class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700">
                Send Verification Email
            </button>

            <p class="text-sm text-center mt-2">
                <a href="#" onclick="showLogin()" class="text-blue-600 hover:underline">
                    Back to Sign In
                </a>
            </p>

            <p id="resetMsg" class="text-center text-green-600 text-sm hidden">
                Verification link sent to your Gmail!
            </p>
        </form>

    </div>

    <script>
        const loginForm = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");
        const forgotForm = document.getElementById("forgotForm");

        const loginBtn = document.getElementById("loginBtn");
        const signupBtn = document.getElementById("signupBtn");

        function showLogin() {
            loginForm.classList.remove("hidden");
            signupForm.classList.add("hidden");
            forgotForm.classList.add("hidden");
        }

        function showSignup() {
            signupForm.classList.remove("hidden");
            loginForm.classList.add("hidden");
            forgotForm.classList.add("hidden");
        }

        function showForgotPassword() {
            forgotForm.classList.remove("hidden");
            loginForm.classList.add("hidden");
            signupForm.classList.add("hidden");
        }

        function sendResetLink() {
            const msg = document.getElementById("resetMsg");
            msg.classList.remove("hidden");

            // Simulate Gmail verification delay
            setTimeout(() => {
                msg.innerText = "Check your Gmail inbox for the reset link.";
            }, 1500);
        }
    </script>

</body>

</html>
